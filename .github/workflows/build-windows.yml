name: Build Windows & macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-cmd: npm run build:win
            artifact-name: windows-build
            artifact-path: |
              dist/*.exe
              dist/*.exe.blockmap
          - os: macos-latest
            build-cmd: npm run build:mac
            artifact-name: macos-build
            artifact-path: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 빌드 (${{ matrix.os }})
        run: ${{ matrix.build-cmd }}

      - name: 빌드 결과물 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ${{