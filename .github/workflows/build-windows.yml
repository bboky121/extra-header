name: Build Windows App

# 실행 조건:
# 1) main 브랜치에 push 될 때마다 -> 빌드 후 Artifacts에만 업로드 (테스트용, 확인용)
# 2) "v"로 시작하는 태그(v1.0.0 등)를 push 할 때 -> 빌드 후 GitHub Release에 자동 첨부 (정식 배포용)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: # Actions 탭에서 수동 실행 버튼도 사용 가능

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm ci

      - name: Windows용 빌드
        run: npm run build:win

      # 매 실행마다 결과물을 Artifacts로 업로드 (Actions 탭에서 다운로드 가능, 90일 보관)
      - name: 빌드 결과물 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.exe.blockmap

      # v로 시작하는 태그를 push했을 때만 실행 -> GitHub Release에 exe 자동 첨부
      - name: GitHub Release에 첨부
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
